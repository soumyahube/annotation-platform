<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Fragments</title>
</head>
<body>

<!-- Fragment Sidebar pour ADMIN -->
<div th:fragment="sidebar-admin">
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="sidebar-brand-icon">
                <i class="fas fa-robot" style="color: white; font-size: 20px;"></i>
            </div>
            <div>
                <div class="sidebar-brand-name">Annotation Platform</div>
                <div class="sidebar-brand-sub">NLP Collaborative</div>
            </div>
        </div>

        <div class="sidebar-section-label">Administration</div>
        <ul class="sidebar-nav">
            <li><a href="/admin/datasets"><i class="fas fa-database nav-icon"></i><span>Datasets</span></a></li>
            <li><a href="/admin/users"><i class="fas fa-users nav-icon"></i><span>Annotateurs</span></a></li>
            <li><a href="/admin/stats"><i class="fas fa-chart-pie nav-icon"></i><span>Dashboard</span></a></li>
            <li><a href="/admin/spammers"><i class="fas fa-shield-alt nav-icon"></i><span>Spammeurs</span></a></li>
            <li><a href="/admin/train"><i class="fas fa-brain nav-icon"></i><span>Entraînement</span></a></li>
        </ul>

        <div class="sidebar-footer">
            <form th:action="@{/logout}" method="post" class="w-full">
                <button type="submit" class="logout-link">
                    <i class="fas fa-sign-out-alt nav-icon"></i>
                    <span>Déconnexion</span>
                </button>
            </form>
        </div>
    </aside>
</div>

<!-- Fragment Sidebar pour ANNOTATEUR -->
<div th:fragment="sidebar-annotator">
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="sidebar-brand-icon">
                <i class="fas fa-robot" style="color: white; font-size: 20px;"></i>
            </div>
            <div>
                <div class="sidebar-brand-name">Annotation Platform</div>
                <div class="sidebar-brand-sub">NLP Collaborative</div>
            </div>
        </div>

        <div class="sidebar-section-label">Annotation</div>
        <ul class="sidebar-nav">
            <li><a href="/annotator/tasks"><i class="fas fa-tasks nav-icon"></i><span>Mes tâches</span></a></li>
            <li><a href="/annotator/stats"><i class="fas fa-chart-line nav-icon"></i><span>Mes statistiques</span></a></li>
        </ul>

        <div class="sidebar-footer">
            <form th:action="@{/logout}" method="post" class="w-full">
                <button type="submit" class="logout-link">
                    <i class="fas fa-sign-out-alt nav-icon"></i>
                    <span>Déconnexion</span>
                </button>
            </form>
        </div>
    </aside>
</div>

<!-- Fragment Topbar -->
<!-- Fragment Topbar -->
<div th:fragment="topbar(title)">
    <header class="topbar">
        <div class="topbar-title" th:text="${title}">Titre</div>
        <div class="topbar-user">
            <span th:text="${#authentication.name}"></span>
            <span th:if="${#authorization.expression('hasRole(''ADMIN'')')}" class="badge badge-blue ml-1">Admin</span>
            <span th:if="${#authorization.expression('hasRole(''ANNOTATOR'')')}" class="badge badge-green ml-1">Annotateur</span>
        </div>
    </header>
</div>

</body>
</html>
