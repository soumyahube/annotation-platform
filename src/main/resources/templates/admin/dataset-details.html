<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détails du dataset</title>
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="app-layout">
    <div th:replace="~{fragments :: sidebar-admin}"></div>
    <main class="main-content">
        <header class="topbar">
            <div class="topbar-title"><i class="fas fa-search"></i> Détails du dataset</div>
            <div class="topbar-user">
                <div class="avatar avatar-admin">
                    <span th:text="${#authentication.name.charAt(0)}"></span>
                </div>
                <span th:text="${#authentication.name}"></span>
            </div>
        </header>
        <div class="page-body">

            <!-- Message flash -->
            <div th:if="${message}" class="alert alert-success">
                <span class="alert-icon"><i class="fas fa-check-circle"></i></span>
                <span th:text="${message}"></span>
            </div>

            <!-- Dataset info -->
            <div th:if="${dataset != null}" class="info-card">
                <h2 th:text="${dataset.name}"></h2>
                <p><strong>Description :</strong> <span th:text="${dataset.description}"></span></p>
                <p><strong>Type :</strong>
                    <span class="badge" th:classappend="${dataset.type == 'TEXTE'} ? 'badge-blue' : 'badge-purple'" th:text="${dataset.type == 'TEXTE'} ? 'Texte simple' : 'Paire de textes'"></span>
                </p>
                <p><strong>Classes :</strong> <span th:text="${dataset.classes}"></span></p>
                <p><strong>Nombre de textes :</strong> <span th:text="${dataset.textUnits.size()}"></span></p>
                <p><strong>Avancement :</strong> <span th:text="${progress} + '%'"></span></p>
                <div class="progress-bar">
                    <div class="progress-fill green" th:style="'width: ' + ${progress} + '%;'"></div>
                </div>
            </div>
            <div th:if="${dataset == null}" class="alert alert-error">
                <span class="alert-icon"><i class="fas fa-exclamation-triangle"></i></span>
                <span>Dataset non trouvé !</span>
            </div>

            <!-- Annotateurs -->
            <div class="card mt-3">
                <div class="card-header">
                    <div class="card-title"><i class="fas fa-users"></i> Annotateurs affectés</div>
                </div>
                <div class="table-wrap">
                    <table th:if="${not #lists.isEmpty(annotators)}">
                        <thead>
                        <tr>
                            <th>Nom</th>
                            <th>Tâches</th>
                            <th>Complétées</th>
                            <th>Progression</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="a : ${annotators}">
                            <td th:text="${a.username}"></td>
                            <td th:text="${a.totalTasks}"></td>
                            <td th:text="${a.completedTasks}"></td>
                            <td th:text="${a.progress} + '%'"></td>
                        </tr>
                        </tbody>
                    </table>
                    <p th:if="${#lists.isEmpty(annotators)}" class="table-empty">Aucun annotateur affecté.</p>
                </div>
            </div>

            <a href="/admin/datasets" class="btn btn-outline mt-3"><i class="fas fa-arrow-left"></i> Retour</a>
        </div>
    </main>
</div>

</body>
</html>
