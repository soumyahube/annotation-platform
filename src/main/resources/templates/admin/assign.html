<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assigner des annotateurs</title>
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="app-layout">
    <div th:replace="~{fragments :: sidebar-admin}"></div>
    <main class="main-content">
        <header class="topbar">
            <div class="topbar-title"><i class="fas fa-user-plus"></i> Assigner des annotateurs</div>
            <div class="topbar-user">
                <div class="avatar avatar-admin">
                    <span th:text="${#authentication.name.charAt(0)}"></span>
                </div>
                <span th:text="${#authentication.name}"></span>
            </div>
        </header>
        <div class="page-body">

            <!-- Messages -->
            <div th:if="${message}" class="alert" th:classappend="${success} ? 'alert-success' : 'alert-error'">
                <span class="alert-icon"><i class="fas fa-info-circle"></i></span>
                <span th:text="${message}"></span>
            </div>
            <div th:if="${param.warning}" class="alert alert-warning">
                <span class="alert-icon"><i class="fas fa-exclamation-triangle"></i></span>
                <span>Attention : Minimum 3 annotateurs recommandés.</span>
            </div>

            <!-- Dataset info -->
            <div th:if="${dataset != null}" class="info-card">
                <h3 th:text="${dataset.name}"></h3>
                <p><strong>Textes à annoter :</strong> <span th:text="${dataset.textUnits.size()}"></span></p>
                <p><strong>Annotateurs disponibles :</strong> <span th:text="${annotators != null ? annotators.size() : 0}"></span></p>
            </div>

            <!-- Formulaire -->
            <div class="card mt-3">
                <form th:action="@{/admin/datasets/{id}/assign/submit(id=${dataset.id})}" method="post">
                    <h4><i class="fas fa-user-check"></i> Choisir les annotateurs</h4>
                    <div th:each="annotator : ${annotators}" class="checkbox-item">
                        <label>
                            <input type="checkbox" name="annotatorIds" th:value="${annotator.id}"/>
                            <span th:text="${annotator.username}"></span>
                        </label>
                    </div>
                    <div th:if="${#lists.isEmpty(annotators)}" class="alert alert-warning">
                        <span>Aucun annotateur disponible. Créez d'abord des comptes.</span>
                    </div>
                    <button type="submit" class="btn btn-primary mt-3" th:disabled="${#lists.isEmpty(annotators)}">
                        <i class="fas fa-tasks"></i> Distribuer les tâches
                    </button>
                </form>
            </div>

            <a href="/admin/datasets" class="btn btn-outline mt-3"><i class="fas fa-arrow-left"></i> Retour</a>
        </div>
    </main>
</div>

</body>
</html>
