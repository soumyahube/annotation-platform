<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Connexion - Plateforme d'Annotation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }
        h2 {
            color: #333;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #45a049;
        }
        .error {
            color: red;
            margin-bottom: 15px;
        }
        .info {
            color: green;
            margin-bottom: 15px;
        }
        .demo-accounts {
            margin-top: 20px;
            text-align: left;
            font-size: 12px;
            color: #666;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
<div class="login-container">
    <h2>🔐 Connexion</h2>

    <div th:if="${param.error}" class="error">
        ❌ Nom d'utilisateur ou mot de passe incorrect
    </div>
    <div th:if="${param.logout}" class="info">
        ✅ Vous avez été déconnecté
    </div>

    <form th:action="@{/login}" method="post">
        <input type="text" name="username" placeholder="Nom d'utilisateur" required/>
        <input type="password" name="password" placeholder="Mot de passe" required/>
        <button type="submit">Se connecter</button>
    </form>

    <div class="demo-accounts">
        <strong>📋 Comptes de démonstration :</strong><br>
        • admin / admin (Administrateur)<br>
        • user1 / user1 (Annotateur)<br>
        • user2 / user2 (Annotateur)<br>
        • user3 / user3 (Annotateur)
    </div>
</div>
</body>
</html>
