<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Plateforme d'Annotation</title>
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="login-page">

<div class="login-box">
    <div class="login-brand">
        <div class="login-brand-icon">
            <i class="fas fa-robot" style="color: white; font-size: 28px;"></i>
        </div>
        <h1>Annotation Platform</h1>
        <p>Plateforme d'annotation collaborative pour le NLP</p>
    </div>

    <!-- Messages d'erreur / succès -->
    <div th:if="${param.error}" class="alert alert-error" style="margin-bottom: 20px;">
        <span class="alert-icon"><i class="fas fa-exclamation-circle"></i></span>
        <span>Nom d'utilisateur ou mot de passe incorrect</span>
    </div>
    <div th:if="${param.logout}" class="alert alert-success" style="margin-bottom: 20px;">
        <span class="alert-icon"><i class="fas fa-check-circle"></i></span>
        <span>Vous avez été déconnecté avec succès</span>
    </div>

    <!-- Formulaire de connexion -->
    <form class="login-form" th:action="@{/login}" method="post">
        <div class="form-group">
            <label for="username"><i class="fas fa-user"></i> Nom d'utilisateur</label>
            <input type="text" id="username" name="username" placeholder="ex: admin, user1..." required autofocus>
        </div>
        <div class="form-group">
            <label for="password"><i class="fas fa-lock"></i> Mot de passe</label>
            <input type="password" id="password" name="password" placeholder="••••••" required>
        </div>
        <button type="submit" class="btn btn-primary w-full">
            <i class="fas fa-sign-in-alt"></i> Se connecter
        </button>
    </form>

    <!-- Comptes de démonstration -->
    <div class="demo-box">
        <div class="demo-box-title">
            <i class="fas fa-info-circle"></i> Comptes de démonstration
        </div>
        <div class="demo-accounts">
            <div class="demo-account">
                <span class="demo-account-name"><i class="fas fa-user-shield" style="color: #6C63FF;"></i> Administrateur</span>
                <span class="demo-account-cred"><span class="badge badge-purple">admin</span> / <span class="badge badge-purple">admin</span></span>
            </div>
            <div class="demo-account">
                <span class="demo-account-name"><i class="fas fa-user-edit" style="color: #10B981;"></i> Annotateur 1</span>
                <span class="demo-account-cred"><span class="badge badge-green">user1</span> / <span class="badge badge-green">user1</span></span>
            </div>
            <div class="demo-account">
                <span class="demo-account-name"><i class="fas fa-user-edit" style="color: #10B981;"></i> Annotateur 2</span>
                <span class="demo-account-cred"><span class="badge badge-green">user2</span> / <span class="badge badge-green">user2</span></span>
            </div>
            <div class="demo-account">
                <span class="demo-account-name"><i class="fas fa-user-edit" style="color: #10B981;"></i> Annotateur 3</span>
                <span class="demo-account-cred"><span class="badge badge-green">user3</span> / <span class="badge badge-green">user3</span></span>
            </div>
        </div>
    </div>
</div>

</body>
</html>
