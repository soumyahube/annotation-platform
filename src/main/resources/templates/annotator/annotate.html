<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annoter un texte</title>
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="app-layout">

    <div th:replace="~{fragments :: sidebar-annotator}"></div>

    <!-- Main Content -->
    <main class="main-content">

        <!-- Topbar -->
        <header class="topbar">
            <div class="topbar-title"><i class="fas fa-pen"></i> Annotation de texte</div>
            <div class="topbar-user">
                <div class="avatar avatar-annotator">
                    <span th:text="${#authentication.name.charAt(0)}"></span>
                </div>
                <span th:text="${#authentication.name}"></span>
            </div>
        </header>

        <!-- Page Content -->
        <div class="page-body">

            <!-- Informations du dataset -->
            <div class="info-card mb-3" th:if="${dataset != null}">
                <div style="display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 8px;">
                    <p><strong><i class="fas fa-database"></i> Dataset :</strong> <span th:text="${dataset.name}"></span></p>
                    <p><strong><i class="fas fa-tag"></i> Type :</strong>
                        <span class="badge" th:classappend="${dataset.type == 'TEXTE'} ? 'badge-blue' : 'badge-purple'" th:text="${dataset.type == 'TEXTE'} ? 'Texte simple' : 'Paire de textes'"></span>
                    </p>
                    <p><strong><i class="fas fa-list"></i> Classes possibles :</strong>
                        <span th:each="cls : ${classes}" class="badge badge-green" th:text="${cls}"></span>
                    </p>
                </div>
                <div class="progress-bar mt-2">
                    <div class="progress-fill cyan" th:style="'width: ' + ${progress} + '%;'"></div>
                </div>
            </div>

            <!-- Texte à annoter -->
            <div class="text-annotation-card" th:if="${textUnit != null}">
                <div class="text-label"><i class="fas fa-file-alt"></i> TEXTE À ANNOTER</div>
                <div class="text-content" th:text="${textUnit.text1}"></div>

                <!-- Deuxième texte pour les paires -->
                <div th:if="${textUnit.text2 != null}">
                    <hr class="text-divider">
                    <div class="text-label"><i class="fas fa-exchange-alt"></i> SECOND TEXTE (paire)</div>
                    <div class="text-content" th:text="${textUnit.text2}"></div>
                </div>
            </div>

            <!-- Formulaire d'annotation -->
            <div class="card mt-3">
                <div class="card-header">
                    <div class="card-title"><i class="fas fa-tags"></i> Choisissez une classe</div>
                </div>

                <form th:action="@{/annotator/annotate/{taskId}(taskId=${task.id})}" method="post">
                    <div class="class-btn-group">
                        <button type="submit" name="selectedClass" th:value="${class}"
                                class="class-btn" th:each="class : ${classes}" th:text="${class}">
                        </button>
                    </div>
                </form>
            </div>

            <!-- Bouton retour -->
            <div class="flex justify-center mt-3">
                <a href="/annotator/tasks" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Retour à mes tâches</a>
            </div>

        </div>
    </main>
</div>

</body>
</html>
